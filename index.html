<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEW HORIZON 中１英単語問題</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e0e7ff; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 100%; max-width: 450px; text-align: center; position: relative; border: 4px solid #fff; }
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* ロゴ画像用のスタイル */
        .logo { max-width: 200px; height: auto; margin-bottom: 20px; }

        .score-bar { display: flex; justify-content: space-around; background: #2d3748; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 18px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .q-text { font-size: 34px; font-weight: bold; margin: 40px 0; color: #1a202c; min-height: 45px; line-height: 1.2; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { height: 80px; font-size: 17px; cursor: pointer; border: 2px solid #e2e8f0; border-radius: 16px; background: #f8fafc; transition: all 0.2s; font-weight: 600; color: #4a5568; }
        .opt-btn:hover:not(:disabled) { background: #edf2f7; border-color: #3182ce; transform: translateY(-2px); }
        .opt-btn:disabled { cursor: default; }
        .correct-ans { background: #48bb78 !important; border-color: #38a169 !important; color: white !important; }
        .wrong-ans { background: #f56565 !important; border-color: #e53e3e !important; color: white !important; }
        #feedback { font-size: 100px; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; z-index: 100; }
        .show-fb { animation: fb-ani 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fb-ani { 0% { opacity:0; scale:0.3; } 50% { opacity:1; scale:1.2; } 100% { opacity:0; scale:1; } }
        .mistake-box { text-align: left; background: #fff5f5; border: 2px solid #fed7d7; padding: 15px; border-radius: 12px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .red-bold { color: #c53030; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .btn-start { background: #4299e1; color: white; border: none; font-size: 20px; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 0 #2b6cb0; }
        .btn-start:active { transform: translateY(3px); box-shadow: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="feedback"></div>
    <div id="sc-start" class="screen active">
        <img src="rogo.png" alt="Logo" class="logo">
        
        <h1 style="color:#2d3748; margin-bottom:10px; line-height:1.2;">NEW HORIZON<br>中１英単語問題</h1>
        <p style="color:#718096; margin-bottom:30px;">50問チャレンジ！</p>
        <button class="btn-start" onclick="initAudio(); startQuiz('ja-en')" style="background:#48bb78; box-shadow: 0 4px 0 #2f855a;">日本語 → 英語</button>
        <button class="btn-start" onclick="initAudio(); startQuiz('en-ja')" style="background:#805ad5; box-shadow: 0 4px 0 #553c9a;">英語 → 日本語</button>
    </div>

    <div id="sc-quiz" class="screen">
        <div class="score-bar">
            <span>正解：<span id="cnt-ok">0</span></span>
            <span style="color:#feb2b2;">ミス：<span id="cnt-ng">0</span></span>
        </div>
        <div id="progress" style="font-weight:bold; color:#a0aec0;">1 / 50</div>
        <div class="q-text" id="q-text"></div>
        <div class="options" id="options"></div>
    </div>

    <div id="sc-result" class="screen">
        <h2 style="font-size:28px;">おつかれさま！</h2>
        <div id="final-score" style="font-size:24px; margin:20px 0; font-weight:bold; color:#2d3748;"></div>
        <div id="mistake-area" style="display:none;">
            <p class="red-bold">間違えた単語は３回ずつ書いて練習しましょう。</p>
            <div class="mistake-box" id="mistake-list"></div>
        </div>
        <button class="btn-start" onclick="goHome()" style="background:#4a5568; box-shadow: 0 4px 0 #2d3748; margin-top:20px;">形式選択に戻る</button>
    </div>
</div>

let state = { mode:'', qNum:0, ok:0, ng:0, current:null, pool:[], mistakes:[], audioCtx:null };

function initAudio() { if (!state.audioCtx) { state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } }

function playFunSound(isCorrect) {
    if (!state.audioCtx) return;
    const t = state.audioCtx.currentTime;
    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();
    osc.connect(gain); gain.connect(state.audioCtx.destination);
    if (isCorrect) {
        osc.type = 'sine'; const freqs = [880, 1108.73, 1318.51];
        freqs.forEach((f, i) => { osc.frequency.setValueAtTime(f, t + i * 0.08); });
        gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.15, t + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
    } else {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(330, t); osc.frequency.exponentialRampToValueAtTime(220, t + 0.4);
        gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0.03, t + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.6);
        osc.start(t); osc.stop(t + 0.6);
    }
}

function getCategory(word) {
    const jp = word.jp; const en = word.en.toLowerCase();
    if (["i", "my", "me", "mine", "you", "your", "he", "his", "him", "she", "her", "we", "our", "us", "they", "their", "them"].includes(en)) return "pronoun";
    if (jp.includes("曜日") || en.endsWith("day")) return "weekday";
    if (jp.match(/^[0-9]+$/) || ["one","two","three","four","five","six","seven","eight","nine","ten","hundred"].includes(en)) return "number";
    if (jp.match(/[1-9]月/) || ["january","february","march","april","may","june","july","august","september","october","november","december"].includes(en)) return "month";
    if (["soccer","baseball","basketball","tennis","football","sport","game"].includes(en) || jp.includes("球")) return "sport";
    if (["apple","banana","orange","fruit","tomato"].includes(en) || jp.includes("物")) return "food_fruit";
    if (jp.match(/父|母|兄|姉|弟|妹|祖父|祖母|おじ|おば|いとこ|兄弟|姉妹/)) return "family";
    if (jp.match(/赤|青|黄|黒|白|緑|色/)) return "color";
    return "general";
}

function startQuiz(mode) {
    state.mode = mode; state.qNum = 0; state.ok = 0; state.ng = 0; state.mistakes = [];

    // 1. 英語の綴り(en)の重複を完全に排除
    const cleanMap = new Map();
    wordStock.forEach(w => {
        const key = w.en.toLowerCase();
        if (!cleanMap.has(key)) cleanMap.set(key, w);
    });
    const uniqueList = Array.from(cleanMap.values());

    // 2. シャッフルして先頭50問を抽出。これで「同じ単語が2回出る」ことはありません。
    state.pool = uniqueList.sort(() => Math.random() - 0.5).slice(0, 50);

    document.getElementById('sc-start').classList.remove('active');
    document.getElementById('sc-result').classList.remove('active');
    document.getElementById('sc-quiz').classList.add('active');
    next();
}

function next() {
    if (state.qNum >= state.pool.length) { showResult(); return; }
    state.current = state.pool[state.qNum];
    state.qNum++;
    
    document.getElementById('progress').innerText = `${state.qNum} / ${state.pool.length}`;
    document.getElementById('cnt-ok').innerText = state.ok;
    document.getElementById('cnt-ng').innerText = state.ng;
    
    const optDiv = document.getElementById('options'); optDiv.innerHTML = '';
    const question = (state.mode === 'ja-en') ? state.current.jp : state.current.en;
    const correct = (state.mode === 'ja-en') ? state.current.en : state.current.jp;
    document.getElementById('q-text').innerText = question;

    const currentCat = getCategory(state.current);
    const distractors = [];
    const seenChoices = new Set([correct]);

    const findDistractors = (candidates) => {
        const shuffled = [...candidates].sort(() => Math.random() - 0.5);
        for (let w of shuffled) {
            const val = (state.mode === 'ja-en') ? w.en : w.jp;
            if (seenChoices.has(val)) continue;

            // 「数」と「数字」のような包含関係による紛らわしさを排除
            if (state.mode === 'en-ja') {
                if (val.includes(correct) || correct.includes(val)) continue;
            }

            distractors.push(val);
            seenChoices.add(val);
            if (distractors.length === 3) return true;
        }
        return false;
    };

    // 1. 同カテゴリーから優先抽出
    const catCandidates = wordStock.filter(w => w.en.toLowerCase() !== state.current.en.toLowerCase() && getCategory(w) === currentCat);
    const finished = findDistractors(catCandidates);

    // 2. 不足分を全体から補充
    if (!finished) {
        findDistractors(wordStock.filter(w => w.en.toLowerCase() !== state.current.en.toLowerCase()));
    }

    const choices = [correct, ...distractors].sort(() => Math.random() - 0.5);
    choices.forEach(c => {
        const b = document.createElement('button');
        b.className = 'opt-btn'; b.innerText = c;
        b.onclick = () => check(c, b, correct);
        optDiv.appendChild(b);
    });
}

function check(selected, btn, correct) {
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    const fb = document.getElementById('feedback');
    if (selected === correct) {
        state.ok++; btn.classList.add('correct-ans');
        fb.innerText = '⭕'; fb.style.color = '#48bb78'; playFunSound(true);
        fb.classList.remove('show-fb'); void fb.offsetWidth; fb.classList.add('show-fb');
        setTimeout(next, 600);
    } else {
        state.ng++; state.mistakes.push(state.current); btn.classList.add('wrong-ans');
        document.querySelectorAll('.opt-btn').forEach(b => { if(b.innerText === correct) b.classList.add('correct-ans'); });
        fb.innerText = '❌'; fb.style.color = '#f56565'; playFunSound(false);
        fb.classList.remove('show-fb'); void fb.offsetWidth; fb.classList.add('show-fb');
        setTimeout(next, 1500);
    }
}

function goHome() {
    document.getElementById('sc-result').classList.remove('active');
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-start').classList.add('active');
}

function showResult() {
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-result').classList.add('active');
    document.getElementById('final-score').innerText = `${state.pool.length}問中 ${state.ok}問 正解！`;
    const list = document.getElementById('mistake-list');
    const area = document.getElementById('mistake-area');
    list.innerHTML = '';
    if (state.mistakes.length > 0) {
        area.style.display = 'block';
        const uniqueMistakes = Array.from(new Map(state.mistakes.map(m => [m.en, m])).values());
        uniqueMistakes.forEach(m => {
            const d = document.createElement('div');
            d.style.cssText = "padding:8px; border-bottom:1px solid #fed7d7; color:#2d3748; font-weight:bold;";
            d.innerText = `${m.en} ： ${m.jp}`;
            list.appendChild(d);
        });
    } else {
        area.style.display = 'none';
        const p = document.createElement('p');
        p.innerText = "50問全問正解！完璧です！✨";
        p.style.cssText = "color:#48bb78; font-size:20px; font-weight:bold; margin:20px 0;";
        list.appendChild(p);
    }
}
</script>
