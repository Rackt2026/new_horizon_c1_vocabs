        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e0e7ff; display: flex; justify-content: center; padding: 20px; }
        #app { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); width: 100%; max-width: 450px; text-align: center; position: relative; border: 4px solid #fff; }
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .score-bar { display: flex; justify-content: space-around; background: #2d3748; color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; font-size: 18px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }
        .q-text { font-size: 34px; font-weight: bold; margin: 40px 0; color: #1a202c; min-height: 45px; line-height: 1.2; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { height: 80px; font-size: 17px; cursor: pointer; border: 2px solid #e2e8f0; border-radius: 16px; background: #f8fafc; transition: all 0.2s; font-weight: 600; color: #4a5568; }
        .opt-btn:hover:not(:disabled) { background: #edf2f7; border-color: #3182ce; transform: translateY(-2px); }
        .opt-btn:disabled { cursor: default; }
        
        .correct-ans { background: #48bb78 !important; border-color: #38a169 !important; color: white !important; }
        .wrong-ans { background: #f56565 !important; border-color: #e53e3e !important; color: white !important; }
        
        #feedback { font-size: 100px; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; z-index: 100; }
        .show-fb { animation: fb-ani 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes fb-ani { 0% { opacity:0; scale:0.3; } 50% { opacity:1; scale:1.2; } 100% { opacity:0; scale:1; } }
        
        .mistake-box { text-align: left; background: #fff5f5; border: 2px solid #fed7d7; padding: 15px; border-radius: 12px; margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .red-bold { color: #c53030; font-weight: bold; font-size: 15px; margin-bottom: 10px; }
        .btn-start { background: #4299e1; color: white; border: none; font-size: 20px; padding: 20px; width: 100%; border-radius: 16px; cursor: pointer; font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 0 #2b6cb0; }

let state = { mode:'', qNum:0, ok:0, ng:0, current:null, mistakes:[], audioCtx:null };

function initAudio() { if (!state.audioCtx) { state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } }

function playFunSound(isCorrect) {
    if (!state.audioCtx) return;
    const t = state.audioCtx.currentTime;
    const osc = state.audioCtx.createOscillator();
    const gain = state.audioCtx.createGain();
    osc.connect(gain); gain.connect(state.audioCtx.destination);
    if (isCorrect) {
        osc.type = 'sine'; const freqs = [880, 1108.73, 1318.51];
        freqs.forEach((f, i) => { osc.frequency.setValueAtTime(f, t + i * 0.08); });
        gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.15, t + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
    } else {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, t); osc.frequency.exponentialRampToValueAtTime(110, t + 0.4);
        gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0.05, t + 0.2); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
        osc.start(t); osc.stop(t + 0.5);
    }
}

// --- 究極の誤答生成ロジック：全単語に対してスコアリングを行う ---
function getSimilarityScore(target, cand) {
    let score = 0;
    const tEn = target.en.toLowerCase();
    const cEn = cand.en.toLowerCase();
    const tJp = target.jp;
    const cJp = cand.jp;

    // 1. スペル末尾の共通性（〜ber, 〜day, 〜tion, 〜ly など）
    if (tEn.slice(-3) === cEn.slice(-3)) score += 40;
    else if (tEn.slice(-2) === cEn.slice(-2)) score += 20;

    // 2. スペル先頭の共通性
    if (tEn.slice(0, 2) === cEn.slice(0, 2)) score += 20;

    // 3. 文字数の近さ
    const lenDiff = Math.abs(tEn.length - cEn.length);
    if (lenDiff === 0) score += 15;
    else if (lenDiff === 1) score += 10;

    // 4. 日本語の意味的な近さ（簡易キーワード判定）
    const keywords = ["月", "曜日", "数", "人", "色", "時", "食", "動", "家", "学"];
    keywords.forEach(k => {
        if (tJp.includes(k) && cJp.includes(k)) score += 60;
    });

    // 5. 品詞的な類似性（簡易判定：〜ing, 〜ed, 〜ly, 〜y など）
    const getSuffix = (s) => s.length > 3 ? s.slice(-2) : "";
    if (getSuffix(tEn) === getSuffix(cEn)) score += 15;

    return score;
}

function startQuiz(mode) {
    state.mode = mode; state.qNum = 0; state.ok = 0; state.ng = 0; state.mistakes = [];
    document.getElementById('sc-start').classList.remove('active');
    document.getElementById('sc-result').classList.remove('active');
    document.getElementById('sc-quiz').classList.add('active');
    next();
}

function next() {
    if (state.qNum >= 30) { showResult(); return; }
    state.qNum++;
    document.getElementById('progress').innerText = `${state.qNum} / 30`;
    document.getElementById('cnt-ok').innerText = state.ok;
    document.getElementById('cnt-ng').innerText = state.ng;
    
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    
    state.current = wordStock[Math.floor(Math.random() * wordStock.length)];
    let question = (state.mode === 'ja-en') ? state.current.jp : state.current.en;
    let correct = (state.mode === 'ja-en') ? state.current.en : state.current.jp;
    document.getElementById('q-text').innerText = question;

    // 全単語をスコアリングして「紛らわしい順」に並べる
    let scoredPool = wordStock
        .filter(w => w.en !== state.current.en)
        .map(w => ({
            word: w,
            score: getSimilarityScore(state.current, w) + Math.random() * 10 // 同スコア時のために少し揺らす
        }));

function playFunSound(isCorrect) {
    if (!state.audioCtx) return;
    const t = state.audioCtx.currentTime;

    } else {

    document.getElementById('sc-start').classList.remove('active');
    document.getElementById('sc-result').classList.remove('active');
    document.getElementById('sc-quiz').classList.add('active');
    next();
}

function goHome() {
    document.getElementById('sc-result').classList.remove('active');
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-start').classList.add('active');
}

function next() {
    if (state.qNum >= 30) { showResult(); return; }
    state.qNum++;
    document.getElementById('progress').innerText = `${state.qNum} / 30`;
    document.getElementById('cnt-ok').innerText = state.ok;
    document.getElementById('cnt-ng').innerText = state.ng;
    
    const optDiv = document.getElementById('options');
    optDiv.innerHTML = '';
    
    state.current = wordStock[Math.floor(Math.random() * wordStock.length)];
    let question, correct, pool;
    if (state.mode === 'ja-en') {
        question = state.current.jp; correct = state.current.en; pool = wordStock.map(w=>w.en);
    } else {
        question = state.current.en; correct = state.current.jp; pool = wordStock.map(w=>w.jp);
    }
    document.getElementById('q-text').innerText = question;

    let choices = [correct];
    while(choices.length < 4) {
        let r = pool[Math.floor(Math.random()*pool.length)];
        if(!choices.includes(r)) choices.push(r);
    }
    choices.sort(() => Math.random() - 0.5);

    choices.forEach(c => {
        const b = document.createElement('button');
        b.className = 'opt-btn';
        b.innerText = c;
        b.onclick = () => check(c, b, correct);
        optDiv.appendChild(b);
    });
}

function check(selected, btn, correct) {
    const btns = document.querySelectorAll('.opt-btn');
    btns.forEach(b => b.disabled = true);
    const fb = document.getElementById('feedback');

    if (selected === correct) {
        state.ok++;
        btn.classList.add('correct-ans');
        fb.innerText = '⭕'; fb.style.color = '#48bb78';
        playFunSound(true);
        fb.classList.remove('show-fb'); void fb.offsetWidth; fb.classList.add('show-fb');
        setTimeout(next, 600);
    } else {
        state.ng++;
        state.mistakes.push(state.current);
        btn.classList.add('wrong-ans');
        btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct-ans'); });
        fb.innerText = '❌'; fb.style.color = '#f56565';
        playFunSound(false);
        fb.classList.remove('show-fb'); void fb.offsetWidth; fb.classList.add('show-fb');
        setTimeout(next, 2000);
    }
}

function showResult() {
    document.getElementById('sc-quiz').classList.remove('active');
    document.getElementById('sc-result').classList.add('active');
    document.getElementById('final-score').innerText = `30問中 ${state.ok}問 正解！`;
    const list = document.getElementById('mistake-list');
    const area = document.getElementById('mistake-area');
    list.innerHTML = '';
    
    if (state.mistakes.length > 0) {
        area.style.display = 'block';
        // 重複を除去してリスト表示
        const unique = Array.from(new Set(state.mistakes.map(m => JSON.stringify(m)))).map(s => JSON.parse(s));
        unique.forEach(m => {
            const d = document.createElement('div');
            d.style.cssText = "padding:8px; border-bottom:1px solid #fed7d7; color:#2d3748; font-weight:bold;";
            d.innerText = `${m.en} ： ${m.jp}`;
            list.appendChild(d);
        });
    } else {
        area.style.display = 'none';
        const p = document.createElement('p');
        p.innerText = "30問全問正解！完璧です！✨";
        p.style.cssText = "color:#48bb78; font-size:20px; font-weight:bold; margin:20px 0;";
        list.appendChild(p);
    }
}
</script>
</body>
</html>
